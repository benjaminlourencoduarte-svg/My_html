<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fake VPS Sandbox</title>
  <style>
    body { margin:0; font-family:Arial; display:flex; height:100vh; }
    #sidebar { width:240px; background:#052b43; color:#fff; padding:12px; box-sizing:border-box; }
    #main { flex:1; display:flex; flex-direction:column; }
    #explorer, #inspector, #log { flex:1; border:1px solid #ccc; margin:4px; padding:8px; overflow:auto; }
    #desktop { flex:2; border:1px solid #999; margin:4px; background:#0b3b6f; color:#fff; position:relative; }
    .desktop-icon { display:inline-block; margin:10px; padding:6px; background:rgba(255,255,255,0.1); border-radius:4px; cursor:pointer; }
    button { margin:4px 0; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h3>Fake Drives</h3>
    <button onclick="switchDrive('C_FAKE_AAAAAa:')">C_FAKE_AAAAAa:</button>
    <button onclick="switchDrive('system23_VM_FAKE_G')">system23_VM_FAKE_G</button>
    <h3>Actions</h3>
    <input type="file" id="fileInput" multiple>
    <button onclick="importFiles()">Import Files</button>
    <button onclick="toggleIsolation()">Toggle Isolation</button>
    <h3>Desktop</h3>
    <select id="fileSelect"></select>
    <button onclick="addToDesktop()">Add to Desktop</button>
  </div>
  <div id="main">
    <div id="explorer"><h3>File Explorer</h3></div>
    <div id="inspector"><h3>Inspector</h3></div>
    <div id="desktop"><h3 style="margin:4px">Fake Desktop</h3></div>
    <div id="log"><h3>Event Log</h3></div>
  </div>

<script>
let currentDrive = 'C_FAKE_AAAAAa:';
let isolation = true;
let files = [];

function log(msg) {
  document.getElementById('log').innerHTML += `<div>${new Date().toLocaleTimeString()} — ${msg}</div>`;
}

function switchDrive(name) {
  currentDrive = name;
  log('Switched to drive ' + name);
}

function importFiles() {
  const input = document.getElementById('fileInput');
  for (const f of input.files) {
    files.push({ name:f.name, size:f.size, drive:currentDrive });
    log('Imported ' + f.name + ' into ' + currentDrive);
  }
  renderExplorer();
  renderFileSelect();
}

function renderExplorer() {
  const explorer = document.getElementById('explorer');
  explorer.innerHTML = '<h3>File Explorer</h3>';
  files.forEach(f=>{
    explorer.innerHTML += `<div onclick="inspectFile('${f.name}')">${f.drive}\\${f.name} (${f.size} bytes)</div>`;
  });
}

function renderFileSelect() {
  const sel = document.getElementById('fileSelect');
  sel.innerHTML = '';
  files.forEach(f=>{
    const opt = document.createElement('option');
    opt.value = f.name;
    opt.textContent = f.name;
    sel.appendChild(opt);
  });
}

function inspectFile(name) {
  const f = files.find(x=>x.name===name);
  const inspector = document.getElementById('inspector');
  inspector.innerHTML = `<h3>Inspector</h3>
    <p>Name: ${f.name}</p>
    <p>Drive: ${f.drive}</p>
    <p>Size: ${f.size} bytes</p>
    <button onclick="simulateRun('${f.name}')">Run in Fake VM</button>`;
}

function toggleIsolation() {
  isolation = !isolation;
  log('Isolation ' + (isolation?'ON':'OFF'));
}

function addToDesktop() {
  const sel = document.getElementById('fileSelect');
  const name = sel.value;
  if (!name) return;
  const desktop = document.getElementById('desktop');
  const icon = document.createElement('div');
  icon.className = 'desktop-icon';
  icon.textContent = name;
  icon.onclick = ()=>simulateRun(name); // run inside VM when clicked
  desktop.appendChild(icon);
  log('Added ' + name + ' to desktop');
}

function simulateRun(name) {
  const pid = Math.floor(Math.random()*10000);
  const popup = window.open('', '', 'width=900,height=600');
  popup.document.write(makeDemoPopupHtml(name, pid));
  log('Simulated run of ' + name + ' (pid ' + pid + ') inside VM');
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}

function makeDemoPopupHtml(name, pid) {
  return `<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Isolated Desktop — ${escapeHtml(name)}</title>
  <style>
    body{margin:0;font-family:Arial;background:linear-gradient(120deg,#0b3b6f,#052b43);color:#fff}
    .bar{height:44px;background:rgba(0,0,0,0.2);display:flex;align-items:center;padding:8px;gap:8px}
    .box{padding:18px}
  </style>
</head>
<body>
  <div class="bar">
    <div style="font-weight:700">Isolated Fake Desktop — ${escapeHtml(name)} (pid ${pid})</div>
    <div style="margin-left:auto">Simulated</div>
  </div>
  <div class="box">
    <p>This window simulates an isolated desktop where the fake program runs visually. This popup never executes your file.</p>
    <canvas id="c" width="800" height="420" style="border-radius:8px;display:block;background:#000"></canvas>
  </div>
  <script>
    const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
    let t=0;
    function loop(){
      t+=0.02;
      ctx.fillStyle='rgba(0,0,0,0.12)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      for(let i=0;i<40;i++){
        ctx.fillStyle='hsla(' + ((t*40+i*7)%360) + ',80%,60%,0.25)';
        ctx.fillRect((Math.sin(t+i)*0.5+0.5)*canvas.width,(Math.cos(t+i)*0.5+0.5)*canvas.height,40,28);
      }
      requestAnimationFrame(loop);
    }
    loop();
    window.addEventListener('message',(ev)=>{
      try{
        const d=ev.data;
        if(d && d.type==='sim_tick' && d.pid===${pid}){
          // handle tick
        }
      }catch(e){}
    });
  </script>
</body>
</html>`;
}
</script>
</body>
</html>
